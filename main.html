<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        table,th,td{
            border: 1px solid black;
            text-align: center;
        }

        .main{
            width: 100%;
            height: 400px;
        }
        
        .black{
            background-color: black;
            color: white;
        }
        .nested{
            width: 100%;
        }
    </style>
</head>
<body>
    <table class="main">
        <tr>
            
            <!-- nested table 1 -->
            
            <td>
                <table class="nested">
                    <thead>
                        <tr>
                            <th colspan="2">Nested Table 2</th>
                        </tr>
                        <tr>
                            <th>Column 1</th>
                            <th>Column 2</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>abc</td>
                            <td>def</td>
                        </tr>
                    </tbody>
                </table>
            </td>
            
            <!-- nested table 2 -->
            
            <td>
                <table class="nested">
                    <thead>
                        <tr>
                            <th>Nested Table 1</th>
                        </tr>
                    </thead>
                    
                    <tbody>
                        <tr>
                            <td>
                                <ul>
                                    <li>List item</li>
                                    <li>List item</li>
                                    <li>List item</li>
                                </ul>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </td>
            
        </tr>
        
        <!-- nested table 3 -->
        
        <tr>
            <td>
                <table class="nested">
                    <thead>
                        <tr>
                            <th colspan="2">Nested Table 3</th>
                        </tr>
                    </thead>
                    
                    <tbody>
                        <tr>
                            <td><a href="#">Nested Table</a></td>
                            <td>Demo Continued</td>
                        </tr>
                    </tbody>
                </table>
            </td>
            
            <!-- nested table 4 -->
            
            <td>
                <table class="nested">
                    <tr>
                        <thead>
                            <th>Nested Table 4</th>
                        </thead>
                    </tr>
                    <tr>
                        <td class="black">HTML</td>
                    </tr>
                </table>
            </td>
            
        </tr>
    </table>
</body>
</html>
